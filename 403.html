<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="dark"/>
  <title>AC Bolus — Accès refusé</title>
  <link rel="icon" href="assets/img/favicon-32.png"/>
  <meta name="theme-color" content="#6ee7ff"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(700px 350px at 15% 0%,  rgba(167,139,250,.22), transparent 60%),
        radial-gradient(500px 300px at 85% 5%, rgba(110,231,255,.18), transparent 60%),
        #0b1220;
      background-attachment: fixed;
      color: rgba(255,255,255,.92);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 64px;
      overflow: hidden;
    }

    /* ── Code erreur ── */
    .error-code {
      font-size: clamp(72px, 18vw, 120px);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fb7185, #fbbf24, #fb7185);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
      text-shadow: none;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    /* ── Titre narratif ── */
    .headline {
      font-size: clamp(15px, 3.5vw, 19px);
      font-weight: 700;
      text-align: center;
      max-width: 520px;
      line-height: 1.5;
      color: rgba(255,255,255,.88);
      margin-bottom: 6px;
    }

    .subline {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ════════════════════════════
       GRAPHIQUE GLYCÉMIE
    ════════════════════════════ */
    .graph-wrap {
      position: relative;
      width: min(480px, 92vw);
      margin-bottom: 28px;
    }

    .graph-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,.3);
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .graph-svg-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      padding: 16px 16px 8px;
    }

    /* Zones cibles */
    .zone-ok  {
      position: absolute;
      left: 16px; right: 16px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* Valeur courante */
    .current-val {
      position: absolute;
      right: 20px;
      font-size: 11px;
      font-weight: 700;
      transition: top .1s;
      pointer-events: none;
    }

    #glycGraph {
      display: block;
      width: 100%;
      height: 130px;
      overflow: visible;
    }

    /* Ligne cible verte */
    .target-line {
      stroke: rgba(52,211,153,.35);
      stroke-width: 1;
      stroke-dasharray: 5 4;
    }

    /* Labels Y */
    .y-label {
      fill: rgba(255,255,255,.28);
      font-size: 10px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    /* Courbe glycémie */
    #glycPath {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Glow sous la courbe */
    #glycFill {
      opacity: .18;
    }

    /* Bulle valeur */
    .bubble-group { pointer-events: none; }

    #bubbleCircle {
      fill: #0b1220;
      stroke-width: 2;
    }

    #bubbleText {
      font-size: 10px;
      font-weight: 700;
      font-family: ui-sans-serif, system-ui, sans-serif;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    /* Emoji pancréas */
    .pancreas-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
    }

    .pancreas-emoji {
      font-size: 22px;
      animation: shrug 2.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes shrug {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50%       { transform: rotate(8deg) scale(1.12); }
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 32px;
      transition: all .4s;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.5); opacity: .6; }
    }

    /* ── Bouton retour ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 32px;
      border-radius: 999px;
      border: 1px solid rgba(110,231,255,.25);
      color: #6ee7ff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all .2s;
      cursor: pointer;
      background: none;
      font-family: inherit;
    }

    .back-btn:hover {
      background: rgba(110,231,255,.08);
      border-color: rgba(110,231,255,.5);
      transform: translateY(-2px);
    }

    /* ── Entrée ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-code  { animation: fadeUp .5s ease both, shimmer 3s ease-in-out infinite .5s; }
    .headline    { animation: fadeUp .5s .12s ease both; }
    .subline     { animation: fadeUp .5s .2s ease both; }
    .graph-wrap  { animation: fadeUp .5s .3s ease both; }
    .status-badge{ animation: fadeUp .5s .42s ease both; }
    .back-btn    { animation: fadeUp .5s .52s ease both; }
  </style>
</head>

<body>

  <div class="error-code" id="errCode">403</div>

  <p class="headline">
    Oups ! Cette page s'est perdue dans les glucides 🍬
  </p>
  <p class="subline" id="errSub">Zone sucrée non accessible · Essaie un autre chemin !</p>

  <!-- Graphique glycémie -->
  <div class="graph-wrap">
    <div class="graph-labels">
      <span>00:00</span><span>01:00</span><span>02:00</span><span>03:00</span><span>Maintenant</span>
    </div>
    <div class="graph-svg-wrap">
      <svg id="glycGraph" viewBox="0 0 440 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fb7185" stop-opacity="1"/>
            <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#34d399"/>
            <stop offset="40%"  stop-color="#fbbf24"/>
            <stop offset="65%"  stop-color="#fb7185"/>
            <stop offset="85%"  stop-color="#fb7185"/>
            <stop offset="100%" stop-color="#fbbf24"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Zone cible (70-180 mg/dL)
             valToY(180)=65  valToY(70)=114  hauteur=49 -->
        <rect x="30" y="65" width="400" height="49" rx="4"
              fill="rgba(52,211,153,.07)" stroke="rgba(52,211,153,.15)" stroke-width="1"/>

        <!-- Lignes horizontales -->
        <line x1="30" y1="14"  x2="430" y2="14"  class="target-line"/>
        <line x1="30" y1="65"  x2="430" y2="65"  class="target-line"/>
        <line x1="30" y1="114" x2="430" y2="114" class="target-line"/>

        <!-- Labels Y -->
        <text x="22" y="14"  class="y-label" text-anchor="end" dominant-baseline="middle">280</text>
        <text x="22" y="65"  class="y-label" text-anchor="end" dominant-baseline="middle">180</text>
        <text x="22" y="114" class="y-label" text-anchor="end" dominant-baseline="middle">70</text>

        <!-- Fill -->
        <path id="glycFill" fill="url(#fillGrad)"/>
        <!-- Courbe -->
        <path id="glycPath" stroke="url(#lineGrad)" filter="url(#glow)"/>

        <!-- Bulle valeur courante -->
        <g class="bubble-group" id="bubble">
          <circle id="bubbleCircle" r="16"/>
          <text id="bubbleText"></text>
        </g>
      </svg>
    </div>

    <!-- Pancréas absent -->
    <div class="pancreas-row">
      <span class="pancreas-emoji">🫀</span>
      <span>Pancréas introuvable · Dernière localisation : inconnue · Statut : en grève</span>
      <span class="pancreas-emoji" style="animation-delay:.8s">💊</span>
    </div>
  </div>

  <!-- Badge statut -->
  <div class="status-badge" id="statusBadge">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Initialisation…</span>
  </div>

  <a href="calculateur-bolus-final.html" class="back-btn">← Retour à AC Bolus</a>

  <script>
    // ════════════════════════════
    // Animation glycémie
    // ════════════════════════════

    // SVG coordinate system:
    // Y=0 → haut (valeur haute), Y=128 → bas (valeur basse)
    // Plage affichée : 40 – 310 mg/dL  →  map vers Y 128 → 0
    const YMIN = 40, YMAX = 310;
    const SVG_H = 128, SVG_W = 440, PAD_L = 30, PAD_R = 10;
    const W = SVG_W - PAD_L - PAD_R; // 400

    function valToY(v) {
      return SVG_H - ((v - YMIN) / (YMAX - YMIN)) * SVG_H;
    }

    // Scénario : glycémie normale → monte → pic → redescend → normale
    // 80 points sur 4 h
    function buildScenario() {
      const pts = [];
      const N = 80;
      for (let i = 0; i < N; i++) {
        const t = i / (N - 1); // 0 → 1
        let v;
        if (t < 0.25) {
          // Phase normale avec légère variation
          v = 95 + 15 * Math.sin(t * Math.PI * 4) + (Math.random() - .5) * 6;
        } else if (t < 0.45) {
          // Montée rapide (repas / panique)
          const p = (t - 0.25) / 0.20;
          v = 100 + p * 185 + (Math.random() - .5) * 10;
        } else if (t < 0.58) {
          // Plateau haut
          v = 280 + (Math.random() - .5) * 12;
        } else if (t < 0.82) {
          // Descente (insuline ?)
          const p = (t - 0.58) / 0.24;
          const eased = 1 - Math.pow(1 - p, 2.2);
          v = 280 - eased * 190 + (Math.random() - .5) * 8;
        } else {
          // Retour zone cible
          v = 92 + 10 * Math.sin((t - 0.82) * Math.PI * 5) + (Math.random() - .5) * 5;
        }
        pts.push(Math.max(75, Math.min(305, v)));
      }
      return pts;
    }

    const SCENARIO = buildScenario();
    const N = SCENARIO.length;

    function buildPath(pts) {
      const coords = pts.map((v, i) => {
        const x = PAD_L + (i / (N - 1)) * W;
        const y = valToY(v);
        return [x, y];
      });

      // Courbe lissée (catmull-rom simplifié)
      let d = `M ${coords[0][0].toFixed(1)} ${coords[0][1].toFixed(1)}`;
      for (let i = 1; i < coords.length; i++) {
        const prev = coords[i - 1];
        const cur  = coords[i];
        const cpx1 = prev[0] + (cur[0] - prev[0]) * 0.5;
        const cpy1 = prev[1];
        const cpx2 = prev[0] + (cur[0] - prev[0]) * 0.5;
        const cpy2 = cur[1];
        d += ` C ${cpx1.toFixed(1)} ${cpy1.toFixed(1)}, ${cpx2.toFixed(1)} ${cpy2.toFixed(1)}, ${cur[0].toFixed(1)} ${cur[1].toFixed(1)}`;
      }
      return { d, coords };
    }

    const { d: fullPath, coords: fullCoords } = buildPath(SCENARIO);

    // Animer point par point
    let currentPt = 0;
    const ANIM_DURATION = 5000; // ms pour dessiner toute la courbe

    const glycPath   = document.getElementById('glycPath');
    const glycFill   = document.getElementById('glycFill');
    const bubble     = document.getElementById('bubble');
    const bubCircle  = document.getElementById('bubbleCircle');
    const bubText    = document.getElementById('bubbleText');
    const statusBadge = document.getElementById('statusBadge');
    const statusDot   = document.getElementById('statusDot');
    const statusText  = document.getElementById('statusText');

    function updateStatus(val) {
      let color, text;
      if (val < 70) {
        color = '#6ee7ff'; text = '🧊 Hypoglycémie · Mange un bonbon vite !';
      } else if (val <= 180) {
        color = '#34d399'; text = '✅ Glycémie dans la cible · Bravo !';
      } else if (val <= 250) {
        color = '#fbbf24'; text = '⚠️ Légère hyperglycémie · À surveiller';
      } else {
        color = '#fb7185'; text = '🚨 Hyperglycémie · Le pancréas a démissionné';
      }
      statusDot.style.background = color;
      statusDot.style.boxShadow  = `0 0 8px ${color}`;
      statusBadge.style.background = `${color}15`;
      statusBadge.style.border     = `1px solid ${color}35`;
      statusText.textContent = text;
    }

    function getStrokeColor(val) {
      if (val < 70)   return '#6ee7ff';
      if (val <= 180) return '#34d399';
      if (val <= 250) return '#fbbf24';
      return '#fb7185';
    }

    function drawUpTo(ptIdx) {
      if (ptIdx < 1) return;
      const pts = SCENARIO.slice(0, ptIdx + 1);
      const { d, coords } = buildPath(pts);

      glycPath.setAttribute('d', d);

      // Fill sous la courbe
      const last = coords[coords.length - 1];
      const first = coords[0];
      const fillD = d + ` L ${last[0].toFixed(1)} ${SVG_H} L ${first[0].toFixed(1)} ${SVG_H} Z`;
      glycFill.setAttribute('d', fillD);

      // Bulle
      const val = Math.round(SCENARIO[ptIdx]);
      const bx = last[0];
      const by = last[1];

      bubCircle.setAttribute('cx', bx);
      bubCircle.setAttribute('cy', by);
      bubCircle.setAttribute('stroke', getStrokeColor(val));

      bubText.setAttribute('x', bx);
      bubText.setAttribute('y', by);
      bubText.setAttribute('fill', getStrokeColor(val));
      bubText.textContent = val;

      updateStatus(val);
    }

    // Animation initiale
    let startTime = null;
    function animFrame(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const progress = Math.min(elapsed / ANIM_DURATION, 1);
      const ptIdx = Math.floor(progress * (N - 1));

      drawUpTo(ptIdx);

      if (progress < 1) {
        requestAnimationFrame(animFrame);
      } else {
        // Pause 1.5s puis recommencer
        setTimeout(() => {
          startTime = null;
          requestAnimationFrame(animFrame);
        }, 1800);
      }
    }

    // Démarrer après un court délai
    setTimeout(() => requestAnimationFrame(animFrame), 600);

    // ════════════════════════════
    // Détecter le code erreur depuis l'URL ou un paramètre
    // ════════════════════════════
    const params = new URLSearchParams(location.search);
    const code   = params.get('code');
    const errCode = document.getElementById('errCode');
    const errSub  = document.getElementById('errSub');

    if (code === '401') {
      errCode.textContent = '401';
      errSub.textContent  = 'Non authentifié · Montre patte blanche (ou ton glucomètre)';
    } else {
      errCode.textContent = '403';
      errSub.textContent  = 'Zone sucrée non accessible · Essaie un autre chemin !';
    }
  </script>

</body>
</html>
